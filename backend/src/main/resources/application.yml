# Get Yourself Backend Configuration

server:
  port: 8080

spring:
  application:
    name: getyourself-backend

  # Database Configuration
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:getyourself}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate  # 生产环境用validate，开发可用update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

# WeChat Mini Program Configuration
wechat:
  appid: ${WECHAT_APPID:YOUR_APPID_HERE}
  secret: ${WECHAT_SECRET:YOUR_SECRET_HERE}
  template-id: ${WECHAT_TEMPLATE_ID:}

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:your-jwt-secret-key-at-least-32-chars-long!!}
    expiration: 604800  # 7 days in seconds

# AI Service Configuration (DeepSeek-V3)
ai:
  api:
    url: ${AI_API_URL:https://api.deepseek.com/v1/chat/completions}
    key: ${AI_API_KEY:YOUR_DEEPSEEK_API_KEY}
    model: ${AI_MODEL:deepseek-chat}

# Logging Configuration
logging:
  level:
    root: INFO
    com.getyourself.backend: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
